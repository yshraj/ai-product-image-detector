<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrueKart Logo Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 2rem; background: #f5f5f5; color: #333; }
  h1 { margin-bottom: 0.5rem; }
  p { margin-bottom: 2rem; color: #666; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
  .card { border: 1px solid #ddd; border-radius: 12px; overflow: hidden; background: #fff; }
  .card-img { display: flex; align-items: center; justify-content: center; padding: 2rem; min-height: 200px; background: #fff; }
  .card-label { padding: 0.75rem 1rem; font-size: 0.875rem; font-weight: 600; border-top: 1px solid #eee; }
  .sizes { display: flex; gap: 1rem; align-items: end; padding: 1rem 2rem 2rem; flex-wrap: wrap; }
  .size { text-align: center; font-size: 0.75rem; color: #666; }
</style>
</head>
<body>
  <h1>TrueKart — Logo concepts</h1>
  <p>Skill 1: logo-designer · Open this file in a browser to compare concepts at favicon sizes.</p>
  <div class="grid">
    <div class="card">
      <div class="card-img"><img src="concepts/concept-1.svg" alt="concept-1" width="128"></div>
      <div class="card-label">1 — Photo + verify (recommended)</div>
      <div class="sizes">
        <div class="size"><img src="concepts/concept-1.svg" width="48"><br>48px</div>
        <div class="size"><img src="concepts/concept-1.svg" width="32"><br>32px</div>
        <div class="size"><img src="concepts/concept-1.svg" width="16"><br>16px</div>
      </div>
    </div>
    <div class="card">
      <div class="card-img"><img src="concepts/concept-2.svg" alt="concept-2" width="128"></div>
      <div class="card-label">2 — Bag + verify badge</div>
    </div>
    <div class="card">
      <div class="card-img"><img src="concepts/concept-3.svg" alt="concept-3" width="128"></div>
      <div class="card-label">3 — TK monogram</div>
    </div>
  </div>
</body>
</html>
