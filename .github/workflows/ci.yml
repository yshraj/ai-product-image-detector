name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: validate · unit · e2e
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate (manifest + file refs + JS syntax)
        run: npm run validate

      - name: Unit tests
        run: npm run test:unit

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: End-to-end tests (extension + popup + a11y)
        run: npm test

      - name: Upload screenshots & report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            test-results/
            playwright-report/
          retention-days: 7
          if-no-files-found: ignore
